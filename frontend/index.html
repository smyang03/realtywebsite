<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>집봄 - 아파트 지도 검색</title>
  <link rel="stylesheet" href="src/styles/main.css" />
  <!-- 카카오 지도 SDK -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f8a038012b357ebeebbcdd23d5c632b0&libraries=services,clusterer">
  </script>
</head>
<body>
  <div id="app">
    <!-- 헤더 -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">🏠</span>
          <span class="logo-text">집봄</span>
        </div>
        <div class="search-bar">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="아파트명 또는 지역을 입력하세요"
            autocomplete="off"
          />
          <button id="searchBtn" class="search-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="locationBtn" title="내 위치">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- 메인 레이아웃 -->
    <div class="main-layout">
      <!-- 좌측 패널 -->
      <aside class="side-panel" id="sidePanel">
        <!-- 지역 선택 -->
        <div class="filter-section">
          <h3 class="filter-title">지역 선택</h3>
          <div class="filter-row">
            <select id="sidoSelect" class="select-box">
              <option value="">시/도 선택</option>
            </select>
          </div>
          <div class="filter-row">
            <select id="sigunguSelect" class="select-box" disabled>
              <option value="">시/군/구 선택</option>
            </select>
          </div>
          <button id="loadAptBtn" class="btn-primary" disabled>
            아파트 조회
          </button>
        </div>

        <!-- 결과 목록 -->
        <div class="result-section">
          <div class="result-header">
            <h3 class="result-title">검색 결과</h3>
            <span id="resultCount" class="result-count"></span>
          </div>
          <div id="aptList" class="apt-list">
            <div class="empty-state">
              <span>지역을 선택하면<br/>아파트 목록이 표시됩니다</span>
            </div>
          </div>
          <div id="pagination" class="pagination"></div>
        </div>
      </aside>

      <!-- 지도 영역 -->
      <main class="map-area">
        <div id="kakaoMap" class="kakao-map"></div>

        <!-- 지도 위 컨트롤 -->
        <div class="map-controls">
          <button class="map-ctrl-btn" id="zoomInBtn" title="확대">+</button>
          <button class="map-ctrl-btn" id="zoomOutBtn" title="축소">−</button>
          <button class="map-ctrl-btn" id="resetViewBtn" title="전체보기">⊙</button>
        </div>

        <!-- 지도 타입 전환 -->
        <div class="map-type-btns">
          <button class="map-type-btn active" data-type="roadmap">일반</button>
          <button class="map-type-btn" data-type="skyview">위성</button>
        </div>

        <!-- 로딩 오버레이 -->
        <div id="mapLoading" class="map-loading hidden">
          <div class="spinner"></div>
          <span>불러오는 중...</span>
        </div>
      </main>

      <!-- 우측 상세 패널 -->
      <div class="detail-panel hidden" id="detailPanel">
        <div class="detail-header">
          <h2 id="detailName" class="detail-name"></h2>
          <button class="detail-close" id="detailClose">✕</button>
        </div>
        <div id="detailContent" class="detail-content"></div>
      </div>
    </div>
  </div>

  <script src="src/utils/api.js"></script>
  <script src="src/utils/helpers.js"></script>
  <script src="src/components/map.js"></script>
  <script src="src/components/sidebar.js"></script>
  <script src="src/components/detail.js"></script>
  <script src="src/pages/main.js"></script>
</body>
</html>
